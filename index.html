<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>生日惊喜</title>

<style>
/* ===== 字体不改：保持你原来的风格 ===== */
body{
  margin:0;
  padding:0;
  font-family: Arial, sans-serif;  /* 如果你原本不是这个，就把这行改回你原本那行 */
  background:#f7dce6;
  text-align:center;
}

h1{
  /* 字体大小不改（如果你原本更大/更小，就改回去） */
  font-size:20px;
  margin:16px 0 8px;
}

#message{
  /* 字体大小不改（如果你原本更大/更小，就改回去） */
  font-size:15px;
  line-height:1.8;
  white-space:pre-wrap;
  margin:12px 16px;
  text-align:left;
}

/* ===== 原装轮播（不加框、不加背景） ===== */
.carousel-item{ display:none; }

.carousel-item img,
.carousel-item video{
  display:block;
  width:90%;          /* ✅ 缩小：不再100%铺满 */
  max-width:520px;    /* ✅ 最大宽度，避免太大 */
  height:auto;
  margin:16px auto;   /* ✅ 居中 */
  padding:0;
  border:none;
  background:none;
  box-shadow:none;
  border-radius:0;
}

/* ===== 气球在背景最底层，不挡内容 ===== */
#balloons{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:-999;
}
.ballon{
  position:absolute;
  width:40px;
  height:60px;
  border-radius:50%;
  animation:floatUp 6s infinite;
}
@keyframes floatUp{
  0%{ transform:translateY(100vh); }
  100%{ transform:translateY(-10vh); }
}
</style>

</head>
<body>

<h1>🎉 生日快乐 🎉</h1>
<p id="message"></p>

<div id="balloons"></div>

<script>
/* 打字机：60 */
const text = `生日快乐，我的债主😂

谢谢你每一次都在我身边，陪我疯过，哭过，笑过。不知道是不是我太久没回来了，上一轮我回来，我们聊了很多，我好像很久没有那样笑过了。我知道你的良苦用心，谢谢你。

我想你应该好奇我怎么会做网站吧？其实，功劳要谢谢你，是你开始教会我很多，我不会做图你教我CANVA,我不会的你都在教我都在学。现在想想，好像好多因为你我才会😂。

不多说啦～很多话在心中🤣🤣，你我明白就好。`;

let i=0;
function typeWriter(){
  const msg=document.getElementById("message");
  msg.innerHTML="";
  i=0;
  function typing(){
    if(i<text.length){
      msg.innerHTML+=text.charAt(i);
      i++;
      setTimeout(typing,60);
    }
  }
  typing();
}

/* 自动轮播：10秒 */
let slideIndex=0;
const slides=document.getElementsByClassName("carousel-item");
function showSlides(){
  for(let s of slides){ s.style.display="none"; }
  slideIndex++;
  if(slideIndex>slides.length){ slideIndex=1; }
  slides[slideIndex-1].style.display="block";
  setTimeout(showSlides,10000);
}

window.onload=function(){
  typeWriter();
  showSlides();
  document.getElementById("birthdayMusic").play().catch(()=>{});
}

/* 背景气球 */
for(let j=0;j<18;j++){
  const b=document.createElement("div");
  b.className="ballon";
  b.style.left=Math.random()*100+"%";
  b.style.background=`hsl(${Math.random()*360},70%,60%)`;
  b.style.animationDuration=(4+Math.random()*4)+"s";
  document.getElementById("balloons").appendChild(b);
}
</script>

</body>
</html>
