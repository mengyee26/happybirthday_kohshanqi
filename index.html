<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>生日快乐</title>

<style>
  body{
    margin:0;
    font-family:"Noto Sans SC",sans-serif;
    background:linear-gradient(to bottom,#f6d9e1,#f4cfd9);
    color:#111;
  }

  /* emoji 层 */
  #balloons{
    position:fixed;
    inset:0;
    pointer-events:none;
    overflow:hidden;
    z-index:0;
  }
  .emoji{
    position:absolute;
    font-size:28px;
    animation:fall linear forwards;
  }
  @keyframes fall{
    0%{ transform:translateY(-12vh); }
    100%{ transform:translateY(112vh); }
  }

  /* 页面整体：一屏内布局 */
  .page{
display:flex;
flex-direction:column;
align-items:center;
position:relative;
z-index:1;
padding-bottom:320px;
}

  /* 顶部区 */
  h1{
    margin:10px 0 0;
    font-size:30px;
    text-align:center;       /* 标题保持居中 */
  }

  .subtitle{
    width:90%;
    max-width:420px;
    margin:20px auto 30px auto;  /* 标题下空一行 + 副标题下空一行 */
    text-align:left;             /* 副标题往左靠 */
    font-size:22px;              /* 你要变大就改这里 */
    font-weight:700;
  }

  /* 内容区：可滚动，不会推着底部媒体跑 */
  .content{
    width:90%;
    max-width:420px;
    flex:1;
    overflow:auto;            /* 关键：文字在这里滚动 */
    padding-bottom:14px;
  }

  .textArea{
    text-align:left;
    line-height:1.8;
    font-size:22px;
    white-space:pre-line;     /* 保留换行 */
  }

  /* 底部媒体：固定在屏幕底部（但不是 position:fixed，不卡） */
  /* 底部媒体 */
/* ✅ 只改照片/视频：固定底部 + 竖屏不被压扁 + 不会左右框 */
.mediaBox{
  position: fixed;
  left:50%;
  transform:translateX(-50%);
  bottom:40px;

  height:320px;          /* 想大改260，想小改220 */
  aspect-ratio: 9 / 16;  /* ✅ 竖屏盒子，绝对不会被压成横 */
  max-width:92vw;

  z-index:10;

  background:transparent;
  box-shadow:none;
  border-radius:14px;    /* 不想圆角就改0 */
  overflow:hidden;
}

.mediaBox img,
.mediaBox video{
  width:100%;
  height:100%;
  display:block;
  object-fit:cover;      /* ✅ 填满，不会左右空框（会轻微裁边） */
  background:transparent;
}

html, body{
  min-height:100vh;
  overflow-y:auto;
  overflow-x:hidden;
}
</style>
<body>
  <div id="balloons"></div>

  <!-- 音乐 -->
  <audio id="bgm" loop>
    <source src="生日快乐.mp3" type="audio/mpeg">
  </audio>

  <div class="page">
    <h1>🎉 生日快乐 🎉</h1>

    <div class="subtitle">生日快乐，我的债主😂</div>

    <!-- 文字滚动区（不会推底部媒体） -->
    <div class="content">
      <div class="textArea" id="message"></div>
    </div>

    <!-- 底部媒体固定区 -->
    <div class="mediaBox">
      <img id="photo" style="display:none;">
      <video id="video" controls playsinline preload="metadata" style="display:none;"></video>
    </div>
  </div>

<script>
/* ===== 打字机 ===== */
const text = `谢谢你每一次都在我身边，陪我疯过，哭过，笑过。
不知道是不是我太久没回来了，上一次我回来，我们聊了很多。
我好像很久没有那样笑过了，我知道你的良苦用心，谢谢你💖

我想你应该好奇我怎么会做网站吧？其实，功劳要谢谢你，
是你开始教会我很多，我不会做图你教我CANVA，
我不会的你都在教我都在学。现在想想，好像好多因为你我才会😂。

不多说啦～很多话在心中🤣🤣，你我明白就好。`;

let ti = 0;
function typeWriter(){
  const box = document.getElementById("message");
  if(!box) return;
  if(ti < text.length){
    box.textContent += text.charAt(ti);
    ti++;
    setTimeout(typeWriter, 100);
  }
}
typeWriter();

/* ===== 照片/视频轮播（10秒切换，视频不自动播放） ===== */
const photos=[
"IMG_20260303_133642.jpg",
"IMG_20260303_133710.jpg",
"IMG_20260303_134045.jpg",
"IMG_20260303_134100.jpg",
"IMG_20260303_134202.jpg",
"IMG_20260303_134223.jpg",
"IMG_20260303_134533.jpg",
"Screenshot_20260303_132729.jpg",
"IMG_20260303_134604_905.jpg"
];

const videos=[
"VID_20260302_213138_460.mp4",
"VID_20260302_213245_548.mp4",
"VID_20260302_213457_098.mp4",
"VID_20260302_213521_414.mp4",
"VID_20260302_214251_375.mp4",
"VID_20260302_214320_930.mp4",
"VID_20260302_214340_532.mp4",
"VID_20260302_214409_337.mp4",
"VID_20260302_214452_656.mp4",
"VID_20260302_214553_513.mp4"
];

const photo=document.getElementById("photo");
const video=document.getElementById("video");

let idx=0;
let showPhoto=true;

function changeMedia(){
  try{ video.pause(); }catch(e){}

  if(showPhoto){
    video.style.display="none";
    photo.style.display="block";
    photo.src = photos[idx % photos.length];
  }else{
    photo.style.display="none";
    video.style.display="block";
    video.src = videos[idx % videos.length];
    video.load();            // 不自动 play
    idx++;
  }
  showPhoto = !showPhoto;
}
changeMedia();
setInterval(changeMedia, 10000);

/* ===== 点哪里都播放/暂停音乐（点到视频不抢） ===== */
const music = document.getElementById("bgm");
window.addEventListener("click", (e)=>{
  if(e.target && (e.target.tagName==="VIDEO" || e.target.closest("video"))) return;
  if(!music) return;
  if(music.paused) music.play().catch(()=>{});
  else music.pause();
});

/* ===== emoji：不卡版本（数量少 + 自动清理） ===== */
function spawnEmojis(){
  const container = document.getElementById("balloons");
  const emojis=["🎉","🎂","💎","💰","✨","💖","🌸","🎈","🥳","💝","🎊","🪄","💵","💌","🎀","💓"];

  for(let i=0;i<14;i++){                 // ✅ 少一点更流畅
    const e=document.createElement("div");
    e.className="emoji";
    e.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    e.style.left=Math.random()*100+"%";

    const dur = 6 + Math.random()*6;     // ✅ 掉落速度（这里调）
    e.style.animationDuration = dur + "s";

    container.appendChild(e);
    setTimeout(()=>e.remove(), (dur*1000)+300); // ✅ 自动删除，不会越堆越卡
  }
}
spawnEmojis();
setInterval(spawnEmojis, 2500);          // ✅ 频率也别太高
</script>

</body>
</html>
