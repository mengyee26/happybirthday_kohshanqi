<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生日快乐</title>

<style>
body{
  margin:0;
  background:#f7dce6;
  font-family: inherit;
}

/* ===== 页面结构 ===== */
.page{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* ===== 文字区域 ===== */
.textArea{
  width:90%;
  max-width:600px;
  text-align:center;
  margin-top:60px;   /* ✅ 文字高度固定在上方 */
  margin-bottom:40px;
}

h1{
  font-size:22px;
  margin-bottom:15px;
}

#message{
  white-space:pre-wrap;
  line-height:1.9;
  font-size:17px;
}

/* ===== 媒体区域 ===== */
.mediaArea{
  width:92%;
  max-width:520px;
  margin-top:auto;        /* ✅ 自动贴底 */
  margin-bottom:120px;    /* ✅ 控制离底部高度 */
}

.carousel-item{
  display:none;
}

.carousel-item img,
.carousel-item video{
  width:100%;
  height:auto;
  display:block;
  border:none;
  background:none;
  box-shadow:none;
  border-radius:0;
}

/* ===== 气球 ===== */
#balloons{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:-1;
}

.ballon{
  position:absolute;
  width:34px;
  height:52px;
  border-radius:50%;
  animation:floatUp 6s linear infinite;
  opacity:0.7;
}

@keyframes floatUp{
  0%{ transform:translateY(110vh); }
  100%{ transform:translateY(-15vh); }
}
</style>
</head>

<body>

<div class="page">

  <div class="textArea">
    <h1>🎉 生日快乐 🎉</h1>
    <div id="message"></div>
  </div>

  <div class="mediaArea">

    <div class="carousel-item"><img src="IMG_20260303_133642.jpg"></div>
    <div class="carousel-item"><video src="VID_20260302_213138_460.mp4" controls></video></div>

    <div class="carousel-item"><img src="IMG_20260303_133710.jpg"></div>
    <div class="carousel-item"><video src="VID_20260302_213245_548.mp4" controls></video></div>

    <div class="carousel-item"><img src="IMG_20260303_134045.jpg"></div>
    <div class="carousel-item"><video src="VID_20260302_213457_098.mp4" controls></video></div>

    <div class="carousel-item"><img src="IMG_20260303_134100.jpg"></div>
    <div class="carousel-item"><video src="VID_20260302_213521_414.mp4" controls></video></div>

    <div class="carousel-item"><img src="IMG_20260303_134202.jpg"></div>
    <div class="carousel-item"><video src="VID_20260302_214251_375.mp4" controls></video></div>

    <div class="carousel-item"><img src="IMG_20260303_134223.jpg"></div>
    <div class="carousel-item"><video src="VID_20260302_214320_930.mp4" controls></video></div>

    <div class="carousel-item"><img src="IMG_20260303_134533.jpg"></div>
    <div class="carousel-item"><video src="VID_20260302_214340_532.mp4" controls></video></div>

    <div class="carousel-item"><img src="Screenshot_20260303_132729.jpg"></div>
    <div class="carousel-item"><video src="VID_20260302_214409_337.mp4" controls></video></div>

    <div class="carousel-item"><img src="IMG_20260303_134604_905.jpg"></div>
    <div class="carousel-item"><video src="VID_20260302_214452_656.mp4" controls></video></div>

    <div class="carousel-item"><video src="VID_20260302_214553_513.mp4" controls></video></div>

  </div>

</div>

<div id="balloons"></div>

<script>
const text = `生日快乐，我的债主😂

谢谢你每一次都在我身边，陪我疯过，哭过，笑过。不知道是不是我太久没回来了，上一轮我回来，我们聊了很多，我好像很久没有那样笑过了。我知道你的良苦用心，谢谢你。

我想你应该好奇我怎么会做网站吧？其实，功劳要谢谢你，是你开始教会我很多，我不会做图你教我CANVA,我不会的你都在教我都在学。现在想想，好像好多因为你我才会😂。

不多说啦～很多话在心中🤣🤣，你我明白就好。`;

let i=0;
function typeWriter(){
  const el=document.getElementById("message");
  function typing(){
    if(i<text.length){
      el.innerHTML+=text.charAt(i);
      i++;
      setTimeout(typing,60);
    }
  }
  typing();
}

let slideIndex=0;
const slides=document.getElementsByClassName("carousel-item");

function showSlides(){
  for(const s of slides){ s.style.display="none"; }
  slideIndex++;
  if(slideIndex>slides.length){ slideIndex=1; }
  slides[slideIndex-1].style.display="block";
  setTimeout(showSlides,10000);
}

window.onload=function(){
  typeWriter();
  showSlides();
};

for(let j=0;j<14;j++){
  const b=document.createElement("div");
  b.className="ballon";
  b.style.left=Math.random()*100+"%";
  b.style.background=`hsl(${Math.random()*360},70%,60%)`;
  b.style.animationDuration=(5+Math.random()*4)+"s";
  document.getElementById("balloons").appendChild(b);
}
</script>

</body>
</html>
