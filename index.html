<style>

body{
  background: linear-gradient(to bottom,#f6d9e1,#f4cfd9);
  margin:0;
  font-family:"Noto Sans SC",sans-serif;
  overflow-x:hidden;
  min-height:100vh;
}

/* emoji背景 */

#balloons{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}

.emoji{
  position:absolute;
  font-size:26px;
  animation:fall linear infinite;
}

@keyframes fall{
  0%{transform:translateY(-15vh);}
  100%{transform:translateY(115vh);}
}

/* 页面 */

.page{
  display:flex;
  flex-direction:column;
  align-items:center;
  position:relative;
  z-index:1;
}

/* 标题 */

  font-size:30px;
  margin-top:10px;
  margin-bottom:5px;
  text-align:center;
}

/* 副标题 */

.subtitle{
  font-size:18px;
  margin-bottom:20px;
  text-align:center;
}

/* 文字区域 */

.textArea{
  width:90%;
  max-width:420px;
  margin:0 auto 20px auto;
  text-align:left;
  line-height:1.8;
  font-size:17px;
}

/* 图片视频 */

.carousel{
  width:90%;
  max-width:420px;
  margin-bottom:50px;
}

.carousel img,
.carousel video{
  width:100%;
  height:auto;
  display:block;
  margin-bottom:18px;
}

</style>

</head>

<div id="balloons"></div>

<div class="page">

我好像很久没有那样笑过了，我知道你的良苦用心，谢谢你💖  

我想你应该好奇我怎么会做网站吧？其实，功劳要谢谢你，  
是你开始教会我很多，我不会做图你教我CANVA，  
我不会的你都在教我都在学。现在想想，好像好多因为你我才会😂。  

不多说啦～很多话在心中🤣🤣，你我明白就好。

<script>

/* emoji掉落 */

const emojis=["🎉","🎂","💖","✨","🎈","🌸","💰","💎"]

function spawn(){

const container=document.getElementById("balloons")

for(let i=0;i<25;i++){

const e=document.createElement("div")

e.className="emoji"

e.innerText=emojis[Math.floor(Math.random()*emojis.length)]

e.style.left=Math.random()*100+"%"

e.style.animationDuration=5+Math.random()*10+"s"

container.appendChild(e)

}

}

spawn()

</script>
