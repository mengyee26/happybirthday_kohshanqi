<!DOCTYPE html>
<html lang="zh">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生日快乐</title>

<style>

body{
  background: linear-gradient(to bottom, #ff7eb9, #ffd6e8);
  margin:0;
  font-family:"Noto Sans SC",sans-serif;
  overflow-x:hidden;
  min-height:100vh;
}

/* emoji背景 */
#balloons{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}

.emoji{
  position:absolute;
  font-size:30px;
  animation:fall linear infinite;
  opacity:0.9;
}

@keyframes fall{
  0%{transform:translateY(-15vh);}
  100%{transform:translateY(115vh);}
}

/* 页面 */
.page{
  display:flex;
  flex-direction:column;
  align-items:center;
  position:relative;
  z-index:1;
}

/* 标题 */
h1{
  font-size:35px;
  margin-top:50px;
  margin-bottom:15px;
  text-align:center;
}

/* 文字区域 */
.textArea{
  width:90%;
  max-width:420px;
  margin:40px auto;
  text-align:left;
  line-height:1.8;
  font-size:18px;
}

/* 轮播 */
.carousel{
  width:90%;
  max-width:420px;
  margin-bottom:80px;
}

/* 图片视频 */
.carousel img,
.carousel video{
  width:100%;
  height:auto;
  display:block;
}

</style>
</head>

<body>

<div id="balloons"></div>

<div class="page">

<h1>🎉 生日快乐 🎉</h1>

<div class="textArea">
生日快乐，我的猪宝宝。谢谢你每一次都在我身边，陪我疯过，哭过，笑过。  
不知道是不是我太久没回来了，上一次我回来，我们聊了很多。  
我好像很久没有那样笑过了，我知道你的一点一滴，你做的每件事，我都很感动。  
希望以后会做得更好，其实，功劳要谢谢你，是你开始教会我很多。  
我不会做回你教我CANVA，我不会的你都在教我都在帮我。  

现在想想，好像好多因为你才会。  
不多说啦～很多话在心中 ❤️
</div>

<div class="carousel">

<video controls>
<source src="video1.mp4" type="video/mp4">
</video>

</div>

</div>

<script>

/* emoji掉落 */
function spawnEmojis(){

const container=document.getElementById("balloons")

const emojis=["🎉","🎂","💎","💰","✨","💖","🌸"]

for(let i=0;i<25;i++){

const e=document.createElement("div")

e.className="emoji"
e.innerText=emojis[Math.floor(Math.random()*emojis.length)]

e.style.left=Math.random()*100+"%"
e.style.animationDuration=5+Math.random()*10+"s"

container.appendChild(e)

}

}

spawnEmojis()

</script>

</body>
</html>
