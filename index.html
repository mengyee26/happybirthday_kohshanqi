<!DOCTYPE html>
<html lang="zh">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生日快乐</title>

<style>

body{
background:linear-gradient(to bottom,#f6d9e1,#f4cfd9);
margin:0;
font-family:"Noto Sans SC",sans-serif;
overflow-x:hidden;
min-height:100vh;
}

/* emoji背景 */

#balloons{
position:fixed;
inset:0;
pointer-events:none;
overflow:hidden;
z-index:0;
}

.emoji{
position:absolute;
font-size:30px;
animation:fall linear infinite;
}

@keyframes fall{

0%{
transform:translateY(-10vh);
}

100%{
transform:translateY(110vh);
}

}

/* 页面 */

.page{
display:flex;
flex-direction:column;
align-items:center;
position:relative;
z-index:1;
padding-bottom:260px;
}

/* 标题 */

h1{
font-size:30px;
margin-top:10px;
margin-bottom:5px;
text-align:center;
}

/* 副标题 */

.subtitle{
width:90%;
max-width:420px;
margin:20px auto 30px auto;
text-align:left;
font-size:24px;
}

/* 文字 */

.textArea{
width:90%;
max-width:420px;
margin:0 auto 20px auto;
text-align:left;
line-height:1.8;
font-size:22px;
white-space: pre-line;
}

/* 视频图片 */

.mediaBox{
width:90%;
max-width:420px;
border-radius:12px;
overflow:hidden;
margin-top:20px;
}

<!-- emoji容器 -->
<div id="balloons"></div>

<!-- 音乐 -->
<audio id="bgm" loop>
<source src="生日快乐.mp3" type="audio/mpeg">
</audio>

<div class="page">

<h1>🎉 生日快乐 🎉</h1>

<div class="subtitle">生日快乐，我的债主😂</div>

<div class="textArea" id="message"></div>

<script>
/* 打字机文字（60速度） */
const text = `谢谢你每一次都在我身边，陪我疯过，哭过，笑过。
不知道是不是我太久没回来了，上一次我回来，我们聊了很多。
我好像很久没有那样笑过了，我知道你的良苦用心，谢谢你💖

我想你应该好奇我怎么会做网站吧？其实，功劳要谢谢你，
是你开始教会我很多，我不会做图你教我CANVA，
我不会的你都在教我都在学。现在想想，好像好多因为你我才会😂。

不多说啦～很多话在心中🤣🤣，你我明白就好。`;

let ti = 0;
function typeWriter(){
  const box = document.getElementById("message");
  if(!box) return;

  if(ti < text.length){
    box.textContent += text.charAt(ti);
    ti++;
    setTimeout(typeWriter, 100);  // 速度 100
  }
}
typeWriter();

/* ✅ 下面继续放你原本的：轮播/音乐/emoji 的代码 */
</script>

<div class="mediaBox">

<img id="photo" style="display:none;">
<video id="video" controls style="display:none;"></video>

</div>

</div>

<script>

/* 照片 */

const photos=[
"IMG_20260303_133642.jpg",
"IMG_20260303_133710.jpg",
"IMG_20260303_134045.jpg",
"IMG_20260303_134100.jpg",
"IMG_20260303_134202.jpg",
"IMG_20260303_134223.jpg",
"IMG_20260303_134533.jpg",
"Screenshot_20260303_132729.jpg",
"IMG_20260303_134604_905.jpg"
]

/* 视频 */

const videos=[
"VID_20260302_213138_460.mp4",
"VID_20260302_213245_548.mp4",
"VID_20260302_213457_098.mp4",
"VID_20260302_213521_414.mp4",
"VID_20260302_214251_375.mp4",
"VID_20260302_214320_930.mp4",
"VID_20260302_214340_532.mp4",
"VID_20260302_214409_337.mp4",
"VID_20260302_214452_656.mp4",
"VID_20260302_214553_513.mp4"
]

const photo=document.getElementById("photo")
const video=document.getElementById("video")

let index=0
let showPhoto=true

function changeMedia(){

if(showPhoto){

video.pause()
video.style.display="none"

photo.src=photos[index%photos.length]
photo.style.display="block"

}else{

photo.style.display="none"

video.src=videos[index%videos.length]
video.style.display="block"

index++

}

showPhoto=!showPhoto

}

changeMedia()

setInterval(changeMedia,10000)

/* 点击播放暂停音乐 */

const music=document.getElementById("bgm")

window.addEventListener("click",function(){

if(music.paused){

music.play().catch(()=>{})

}else{

music.pause()

}

})

/* emoji */

function spawnEmojis(){

const container=document.getElementById("balloons")

const emojis=["🎉","🎂","💎","💰","✨","💖","🌸","🎈","🥳","💝","🎊","🪄","🎀","💌","💵"]

for(let i=0;i<15;i++)

const e=document.createElement("div")

e.className="emoji"

e.innerText=emojis[Math.floor(Math.random()*emojis.length)]

e.style.left=Math.random()*100+"%"

e.style.animationDuration=3+Math.random()*4+"s"

container.appendChild(e)

setTimeout(()=>{e.remove()},12000)
}

spawnEmojis()

setInterval(spawnEmojis,6000)

</script>

</body>
</html>
