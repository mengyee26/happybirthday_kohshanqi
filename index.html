<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>生日快乐</title>

<style>
  body{
    margin:0;
    background:#f7dce6;
    font-family: inherit;
    overflow-x:hidden; /* 防止横向爆版卡死 */
  }

  /* 背景 emoji 层（不挡内容） */
  #balloons{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0; /* 背景层 */
    overflow:hidden;
  }

  .emoji{
    position:absolute;
    font-size:32px;
    opacity:0.9;
    animation: fall linear infinite;
    text-shadow: 0 0 10px rgba(255,255,255,0.6);
  }

  @keyframes fall{
    0%{ transform: translateY(-15vh); opacity:1; }
    100%{ transform: translateY(115vh); opacity:0.9; }
  }

  /* 页面内容层 */
  .page{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    position:relative;
    z-index:1; /* 在背景之上 */
  }

  .textArea{
    width:90%;
    max-width:600px;
    margin-top:60px;
    margin-bottom:30px;
    text-align:left;
  }

  h1{
    font-size:30px;
    margin:0 0 15px 0;
    text-align:center;
  }

  #message{
    white-space:pre-wrap;
    line-height:1.9;
    font-size:25px;
  }

  /* 媒体区域：手机/电脑都稳，不会 500% 爆掉 */
  .mediaArea{
    width:95%;
    max-width:700px;
    margin-top:auto;
    margin-bottom:250px; /* 你想更高就调这个：变小 = 更靠底；变大 = 更往上 */
  }

  .carousel-item{ display:none; }

  .carousel-item img,
  .carousel-item video{
    width:100%;
    height:auto;
    display:block;
    border:none;
    background:none;
    box-shadow:none;
    border-radius:0;
  }
</style>
</head>

<body>

<!-- 背景层 -->
<div id="balloons"></div>

<!-- 音乐：隐藏播放器；点击页面任意处播放 -->
<audio id="bgm" loop preload="auto">
  <source src="生日快乐.mp3" type="audio/mpeg" />
</audio>

<div class="page">

  <div class="textArea">
    <h1>🎉 生日快乐 🎉</h1>
    <div id="message"></div>
  </div>

  <div class="mediaArea">
    <div class="carousel-item"><img src="IMG_20260303_133642.jpg" /></div>
    <div class="carousel-item"><video src="VID_20260302_213138_460.mp4" controls playsinline></video></div>

    <div class="carousel-item"><img src="IMG_20260303_133710.jpg" /></div>
    <div class="carousel-item"><video src="VID_20260302_213245_548.mp4" controls playsinline></video></div>

    <div class="carousel-item"><img src="IMG_20260303_134045.jpg" /></div>
    <div class="carousel-item"><video src="VID_20260302_213457_098.mp4" controls playsinline></video></div>

    <div class="carousel-item"><img src="IMG_20260303_134100.jpg" /></div>
    <div class="carousel-item"><video src="VID_20260302_213521_414.mp4" controls playsinline></video></div>

    <div class="carousel-item"><img src="IMG_20260303_134202.jpg" /></div>
    <div class="carousel-item"><video src="VID_20260302_214251_375.mp4" controls playsinline></video></div>

    <div class="carousel-item"><img src="IMG_20260303_134223.jpg" /></div>
    <div class="carousel-item"><video src="VID_20260302_214320_930.mp4" controls playsinline></video></div>

    <div class="carousel-item"><img src="IMG_20260303_134533.jpg" /></div>
    <div class="carousel-item"><video src="VID_20260302_214340_532.mp4" controls playsinline></video></div>

    <div class="carousel-item"><img src="Screenshot_20260303_132729.jpg" /></div>
    <div class="carousel-item"><video src="VID_20260302_214409_337.mp4" controls playsinline></video></div>

    <div class="carousel-item"><img src="IMG_20260303_134604_905.jpg" /></div>
    <div class="carousel-item"><video src="VID_20260302_214452_656.mp4" controls playsinline></video></div>

    <div class="carousel-item"><video src="VID_20260302_214553_513.mp4" controls playsinline></video></div>
  </div>

</div>

<script>
(function(){
  const text = `生日快乐，我的债主😂

谢谢你每一次都在我身边，陪我疯过，哭过，笑过。不知道是不是我太久没回来了，上一轮我回来，我们聊了很多，我好像很久没有那样笑过了。我知道你的良苦用心，谢谢你。

我想你应该好奇我怎么会做网站吧？其实，功劳要谢谢你，是你开始教会我很多，我不会做图你教我CANVA,我不会的你都在教我都在学。现在想想，好像好多因为你我才会😂。

不多说啦～很多话在心中🤣🤣，你我明白就好。`;

  function typeWriter(speed=60){
    const el = document.getElementById("message");
    if(!el) return;
    el.innerHTML = "";
    let i = 0;
    (function typing(){
      if(i < text.length){
        el.innerHTML += text.charAt(i++);
        setTimeout(typing, speed);
      }
    })();
  }

  function startCarousel(interval=10000){
    const slides = Array.from(document.getElementsByClassName("carousel-item"));
    if(slides.length === 0) return;

    let idx = 0;
    function show(){
      slides.forEach(s => s.style.display = "none");
      slides[idx].style.display = "block";
      idx = (idx + 1) % slides.length;
      setTimeout(show, interval);
    }
    show();
  }

  function spawnEmojis(){
    const layer = document.getElementById("balloons");
    if(!layer) return;

    // 清掉旧的，避免重复生成卡死
    layer.innerHTML = "";

    const emojis = [
      "✨","🌟","💫","⭐",
      "🎉","🎈","🥳","🎂",
      "💖","❤️","🩷","💛","💙","💜",
      "🌸","🌷","🌹","💐",
      "🍰","🧁","🍭","🍬",
      "🧸","🎀","💎","🌈"
    ];

    const count = 60; // 很热闹：60；想更少改 40；想爆炸改 80
    for(let j=0;j<count;j++){
      const e = document.createElement("div");
      e.className = "emoji";
      e.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      e.style.left = (Math.random()*100) + "%";
      e.style.animationDuration = (3 + Math.random()*3) + "s"; // 越小越快
      e.style.animationDelay = (-Math.random()*5) + "s";
      layer.appendChild(e);
    }
  }

  // 点击页面播放音乐（手机规则：必须用户操作）
  function enableMusicClick(){
    const music = document.getElementById("bgm");
    if(!music) return;
    window.addEventListener("click", function(){
      music.play().catch(()=>{});
    }, { once:true });
  }

  window.addEventListener("load", function(){
    try{ typeWriter(60); }catch(e){}
    try{ startCarousel(10000); }catch(e){}
    try{ spawnEmojis(); }catch(e){}
    try{ enableMusicClick(); }catch(e){}
  });
})();   
</script> 

</body>
</html>

</body>
