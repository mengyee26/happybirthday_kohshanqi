<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>生日快乐🎉</title>
<!-- 引入 Ma Shan Zheng 字体 -->
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 24px;
    line-height: 1.8;
    margin: 0;
    padding: 30px;
    background: linear-gradient(to top, #fffbe6, #ffe0f0);
    overflow: hidden;
    color: #333;
    text-align: center;
  }

  p {
    margin-bottom: 20px;
  }

  button {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 22px;
    padding: 10px 20px;
    border: none;
    border-radius: 15px;
    background-color: #ffb6c1;
    color: white;
    cursor: pointer;
    margin-bottom: 30px;
    transition: transform 0.2s;
  }

  button:hover {
    transform: scale(1.1);
  }

  /* 气球动画 */
  .balloon {
    position: absolute;
    width: 50px;
    height: 70px;
    border-radius: 50% 50% 50% 50%;
    opacity: 0.8;
    animation: float 6s linear infinite;
  }

  .balloon:nth-child(1) { background: #ff7f7f; left: 10%; animation-duration: 7s; }
  .balloon:nth-child(2) { background: #ffb347; left: 30%; animation-duration: 8s; }
  .balloon:nth-child(3) { background: #7fbfff; left: 50%; animation-duration: 6s; }
  .balloon:nth-child(4) { background: #ff77ff; left: 70%; animation-duration: 7.5s; }
  .balloon:nth-child(5) { background: #90ee90; left: 90%; animation-duration: 6.5s; }

  @keyframes float {
    0% { transform: translateY(100vh) rotate(0deg); }
    100% { transform: translateY(-200px) rotate(360deg); }
  }
</style>
</head>
<body>

<!-- 气球 -->
<div class="balloon"></div>
<div class="balloon"></div>
<div class="balloon"></div>
<div class="balloon"></div>
<div class="balloon"></div>

<h1>生日快乐，我的债主😂</h1>

<p>谢谢你每一次都在我身边，陪我疯过，哭过，笑过。不知道是不是我太久没回来了，上一轮我回来，我们聊了很多，我好像很久没有那样笑过了。我知道你的良苦用心，谢谢你。</p>

<p>我想你应该好奇我怎么会做网站吧？其实，功劳要谢谢你，是你开始教会我很多，我不会做图你教我 CANVA, 我不会的你都在教我都在学。现在想想，好像好多因为你我才会😂。</p>

<p>不多说啦～很多话在心中🤣🤣，你我明白就好。</p>

<!-- 播放按钮 -->
<button onclick="document.getElementById('bgm').play()">点我播放生日歌🎵</button>
<audio id="bgm" src="birthday_song.mp3"></audio>

</body>
</html>
