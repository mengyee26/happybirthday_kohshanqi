<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>生日惊喜</title>
<style>
body {
    margin:0;
    padding:0;
    font-family: 'Courier New', monospace;
    background: linear-gradient(to bottom, #ffeef8, #fff0f0);
    text-align:center;
    overflow-x:hidden;
}
h1 { margin-top:30px; font-size:36px; color:#d63384;}
button {
    padding:10px 20px;
    font-size:18px;
    cursor:pointer;
    margin-top:20px;
    border-radius:8px;
    border:none;
    background:#d63384;
    color:white;
}
#message { font-size:20px; line-height:1.6; white-space:pre-wrap; margin:30px auto; max-width:600px; text-align:left;}
/* 轮播样式 */
.carousel { position:relative; max-width:80%; margin:40px auto; }
.carousel-item { display:none; }
.carousel-item img, .carousel-item video { width:100%; border-radius:10px; }
.prev, .next {
    cursor:pointer; position:absolute; top:50%; width:auto; padding:16px; color:white;
    font-weight:bold; font-size:24px; border-radius:0 3px 3px 0; user-select:none;
    background:rgba(0,0,0,0.3);
}
.next { right:0; border-radius:3px 0 0 3px; }
.prev:hover, .next:hover { background:rgba(0,0,0,0.6); }

/* 烟花气球简单动画 */
#balloons { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:-1;}
.ballon { position:absolute; width:50px; height:70px; border-radius:50%; animation:floatUp 5s infinite; }
@keyframes floatUp { 0% {transform:translateY(100vh);} 100% {transform:translateY(-10vh);} }
</style>
</head>
<body>

<h1>🎉 生日快乐 🎉</h1>
<button onclick="typeWriter()">点击显示祝福 💌</button>
<p id="message"></p>

<!-- 音乐自动播放 -->
<audio src="https://raw.githubusercontent.com/mengyee26/happybirthday_kohshanqi/main/birthday_song.mp3" autoplay loop></audio>

<div class="carousel">
  <!-- 照片 & 视频交替 -->
  <div class="carousel-item"><img src="https://raw.githubusercontent.com/mengyee26/happybirthday_kohshanqi/main/IMG_20260303_133642.jpg"></div>
  <div class="carousel-item"><video src="https://raw.githubusercontent.com/mengyee26/happybirthday_kohshanqi/main/VID_20260302_213138_460.mp4" controls></video></div>
  <div class="carousel-item"><img src="https://raw.githubusercontent.com/mengyee26/happybirthday_kohshanqi/main/IMG_20260303_133710.jpg"></div>
  <div class="carousel-item"><video src="https://raw.githubusercontent.com/mengyee26/happybirthday_kohshanqi/main/VID_20260302_213245_548.mp4" controls></video></div>
  <div class="carousel-item"><img src="https://raw.githubusercontent.com/mengyee26/happybirthday_kohshanqi/main/IMG_20260303_134045.jpg"></div>
  <div class="carousel-item"><video src="https://raw.githubusercontent.com/mengyee26/happybirthday_kohshanqi/main/VID_20260302_213457_098.mp4" controls></video></div>
  <div class="carousel-item"><img src="https://raw.githubusercontent.com/mengyee26/happybirthday_kohshanqi/main/IMG_20260303_134100.jpg"></div>
  <div class="carousel-item"><video src="https://raw.githubusercontent.com/mengyee26/happybirthday_kohshanqi/main/VID_20260302_213521_414.mp4" controls></video></div>
  <div class="carousel-item"><img src="https://raw.githubusercontent.com/mengyee26/happybirthday_kohshanqi/main/IMG_20260303_134202.jpg"></div>
  <div class="carousel-item"><video src="https://raw.githubusercontent.com/mengyee26/happybirthday_kohshanqi/main/VID_20260302_214251_375.mp4" controls></video></div>
  <div class="carousel-item"><img src="https://raw.githubusercontent.com/mengyee26/happybirthday_kohshanqi/main/IMG_20260303_134223.jpg"></div>
  <div class="carousel-item"><video src="https://raw.githubusercontent.com/mengyee26/happybirthday_kohshanqi/main/VID_20260302_214320_930.mp4" controls></video></div>
  <div class="carousel-item"><img src="https://raw.githubusercontent.com/mengyee26/happybirthday_kohshanqi/main/IMG_20260303_134533.jpg"></div>
  <div class="carousel-item"><video src="https://raw.githubusercontent.com/mengyee26/happybirthday_kohshanqi/main/VID_20260302_214340_532.mp4" controls></video></div>
  <div class="carousel-item"><img src="https://raw.githubusercontent.com/mengyee26/happybirthday_kohshanqi/main/Screenshot_20260303_132729.jpg"></div>
  <div class="carousel-item"><video src="https://raw.githubusercontent.com/mengyee26/happybirthday_kohshanqi/main/VID_20260302_214409_337.mp4" controls></video></div>
  <div class="carousel-item"><img src="https://raw.githubusercontent.com/mengyee26/happybirthday_kohshanqi/main/IMG_20260303_134604_905.jpg"></div>
  <div class="carousel-item"><video src="https://raw.githubusercontent.com/mengyee26/happybirthday_kohshanqi/main/VID_20260302_214452_656.mp4" controls></video></div>
  <div class="carousel-item"><video src="https://raw.githubusercontent.com/mengyee26/happybirthday_kohshanqi/main/VID_20260302_214553_513.mp4" controls></video></div>

  <!-- 上一张/下一张按钮 -->
  <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
  <a class="next" onclick="plusSlides(1)">&#10095;</a>
</div>

<div id="balloons"></div>

<script>
// 打字机效果祝福词
const text = `生日快乐，我的债主😂

谢谢你每一次都在我身边，陪我疯过，哭过，笑过。不知道是不是我太久没回来了，上一轮我回来，我们聊了很多，我好像很久没有那样笑过了。我知道你的良苦用心，谢谢你。

我想你应该好奇我怎么会做网站吧？其实，功劳要谢谢你，是你开始教会我很多，我不会做图你教我CANVA,我不会的你都在教我都在学。现在想想，好像好多因为你我才会😂。

不多说啦～很多话在心中🤣🤣，你我明白就好。`;

let i = 0;
function typeWriter() {
    const msg = document.getElementById("message");
    msg.innerHTML = "";
    i = 0;
    function typing() {
        if (i < text.length) {
            msg.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, 50);
        }
    }
    typing();
}

// 轮播功能
let slideIndex = 0;
const slides = document.getElementsByClassName("carousel-item");

function showSlides(n) {
    if (n >= slides.length) slideIndex = 0;
    if (n < 0) slideIndex = slides.length - 1;
    for (let i=0;i<slides.length;i++){ slides[i].style.display="none"; }
    slides[slideIndex].style.display="block";
}

// 手动按钮
function plusSlides(n) {
    clearInterval(autoSlide); // 点击按钮重置自动轮播
    showSlides(slideIndex += n);
    autoSlide = setInterval(nextSlide, 4000);
}

// 自动轮播
function nextSlide() {
    slideIndex++;
    showSlides(slideIndex);
}

showSlides(slideIndex);
let autoSlide = setInterval(nextSlide, 4000);

// 烟花气球动画
for(let j=0;j<20;j++){
    const b=document.createElement("div");
    b.className="ballon";
    b.style.left=Math.random()*100+"%";
    b.style.background=`hsl(${Math.random()*360},70%,60%)`;
    b.style.animationDuration=(3+Math.random()*5)+"s";
    document.getElementById("balloons").appendChild(b);
}
</script>
</body>
</html>
